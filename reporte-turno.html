<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte de Turno</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a1a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; padding: 16px; }
  .container { max-width: 480px; margin: 0 auto; }
  h1 { font-size: 18px; font-weight: 700; text-align: center; margin-bottom: 20px; letter-spacing: 1px; }
  .turno-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .turno-btn { flex: 1; padding: 10px 0; border: 2px solid #444; background: transparent; color: #aaa; font-size: 14px; font-weight: 700; border-radius: 8px; cursor: pointer; transition: all 0.15s; letter-spacing: 0.5px; }
  .turno-btn.active { background: #2563eb; border-color: #2563eb; color: #fff; }
  .card { background: #2a2a2a; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .section-title { font-size: 12px; font-weight: 700; color: #888; letter-spacing: 1.5px; margin-bottom: 12px; text-transform: uppercase; }
  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 12px; color: #aaa; margin-bottom: 4px; font-weight: 500; }
  .field input, .field select { width: 100%; background: #1a1a1a; border: 1px solid #444; border-radius: 8px; padding: 10px 12px; font-size: 15px; color: #fff; outline: none; transition: border-color 0.15s; -webkit-appearance: none; appearance: none; }
  .field input:focus, .field select:focus { border-color: #2563eb; }
  .field input::placeholder { color: #555; }
  .field input[readonly] { color: #888; cursor: default; }
  .field textarea { width: 100%; background: #1a1a1a; border: 1px solid #444; border-radius: 8px; padding: 10px 12px; font-size: 15px; color: #fff; outline: none; resize: vertical; min-height: 90px; font-family: inherit; line-height: 1.5; }
  .field textarea:focus { border-color: #2563eb; }
  .field textarea::placeholder { color: #555; }
  .field-row { display: flex; gap: 8px; }
  .field-row .field { flex: 1; }
  .field-row .field.monto { flex: 0 0 120px; }
  .bill-block { background: #222; border-radius: 8px; padding: 10px; margin-top: 4px; }
  .bill-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .bill-row:last-child { margin-bottom: 0; }
  .bill-idx { font-size: 12px; color: #666; min-width: 16px; font-weight: 700; }
  .bill-row select, .bill-row input { background: #1a1a1a; border: 1px solid #444; border-radius: 8px; padding: 8px 10px; font-size: 14px; color: #fff; outline: none; -webkit-appearance: none; appearance: none; }
  .bill-row select { flex: 1; }
  .bill-row input { width: 100px; }
  .bill-row select:focus, .bill-row input:focus { border-color: #2563eb; }
  .bill-row input::placeholder { color: #555; }
  .pending-block { background: #222; border-radius: 8px; padding: 10px; margin-top: 4px; }
  .pending-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .pending-row:last-child { margin-bottom: 0; }
  .pending-idx { font-size: 12px; color: #666; min-width: 16px; font-weight: 700; }
  .pending-row input { background: #1a1a1a; border: 1px solid #444; border-radius: 8px; padding: 8px 10px; font-size: 14px; color: #fff; outline: none; }
  .pending-row input:focus { border-color: #2563eb; }
  .pending-row input::placeholder { color: #555; }
  .pending-row input.grow { flex: 1; }
  .pending-row input.monto { width: 110px; }
  .extra-field { background: #222; border: 1px dashed #555; border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; }
  .extra-nombre { width: 100%; background: transparent; border: none; border-bottom: 1px dashed #555; border-radius: 0; padding: 4px 0 8px; font-size: 13px; font-weight: 700; color: #f59e0b; outline: none; letter-spacing: 0.5px; margin-bottom: 8px; }
  .extra-nombre:focus { border-bottom-color: #2563eb; }
  .extra-nombre::placeholder { color: #666; font-weight: 400; font-style: italic; }
  .extra-valor { width: 100%; background: #1a1a1a; border: 1px solid #444; border-radius: 8px; padding: 10px 12px; font-size: 15px; color: #fff; outline: none; }
  .extra-valor:focus { border-color: #2563eb; }
  .extra-valor::placeholder { color: #555; }
  .divider { height: 1px; background: #333; margin: 12px 0; }
  select option { background: #2a2a2a; color: #fff; }

  .foto-hint { font-size: 12px; color: #666; margin-bottom: 8px; font-style: italic; }
  .foto-upload-area { border: 2px dashed #444; border-radius: 8px; padding: 14px; text-align: center; cursor: pointer; color: #666; font-size: 14px; transition: all 0.15s; background: #1a1a1a; }
  .foto-upload-area:active { border-color: #2563eb; color: #2563eb; }
  .foto-previews { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .foto-preview-item { position: relative; }
  .foto-preview-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid #444; display: block; }
  .foto-preview-item .foto-remove { position: absolute; top: -6px; right: -6px; background: #dc2626; color: #fff; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 700; }
  .foto-count { font-size: 12px; color: #4ade80; margin-top: 6px; }

  .btn-copy { width: 100%; padding: 16px; background: #2563eb; color: #fff; font-size: 16px; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; letter-spacing: 0.5px; transition: all 0.15s; margin-top: 4px; }
  .btn-copy:active { transform: scale(0.98); }
  .btn-copy.uploading { background: #854d0e; }
  .btn-copy.copied { background: #16a34a; }
  .btn-copy:disabled { opacity: 0.7; cursor: not-allowed; }

  .progress-bar-wrap { background: #333; border-radius: 8px; height: 6px; margin-top: 10px; display: none; }
  .progress-bar { background: #2563eb; height: 6px; border-radius: 8px; width: 0%; transition: width 0.3s; }
</style>
</head>
<body>
<div class="container">

  <h1>📋 REPORTE DE TURNO</h1>

  <div class="turno-tabs">
    <button class="turno-btn active" onclick="setTurno('MAÑANA')">MAÑANA</button>
    <button class="turno-btn" onclick="setTurno('TARDE')">TARDE</button>
    <button class="turno-btn" onclick="setTurno('NOCHE')">NOCHE</button>
  </div>

  <div class="card">
    <div class="section-title">👤 Agente</div>
    <div class="field"><label>NOMBRE</label><input id="f-nombre" type="text" placeholder="Tu nombre" autocomplete="off"></div>
  </div>

  <!-- INICIO -->
  <div class="card">
    <div class="section-title">🟢 Inicio de Turno</div>
    <div class="field-row">
      <div class="field"><label>DÍA</label><input id="f-ini-dia" type="text" placeholder="DD/MM/AAAA"></div>
      <div class="field monto"><label>HORA</label><input id="f-ini-hora" type="text" readonly></div>
    </div>
    <div class="field"><label>FICHAS</label><input id="f-ini-fichas" type="text" placeholder="ej: 1.213.283"></div>
    <div class="field">
      <label>BILLETERAS</label>
      <div class="bill-block">
        <div class="bill-row"><span class="bill-idx">1</span><select id="ini-b1-n"><option value="">— Elegir —</option><option>PERSONAL PAY</option><option>CLARO PAY</option><option>MERCADO PAGO</option><option>ASTROPAY</option><option>NX</option><option>PREX</option><option>UALA</option><option>LEMON</option><option>BUEPP</option></select><input id="ini-b1-m" type="text" placeholder="$ monto"></div>
        <div class="bill-row"><span class="bill-idx">2</span><select id="ini-b2-n"><option value="">— Elegir —</option><option>PERSONAL PAY</option><option>CLARO PAY</option><option>MERCADO PAGO</option><option>ASTROPAY</option><option>NX</option><option>PREX</option><option>UALA</option><option>LEMON</option><option>BUEPP</option></select><input id="ini-b2-m" type="text" placeholder="$ monto"></div>
        <div class="bill-row"><span class="bill-idx">3</span><select id="ini-b3-n"><option value="">— Elegir —</option><option>PERSONAL PAY</option><option>CLARO PAY</option><option>MERCADO PAGO</option><option>ASTROPAY</option><option>NX</option><option>PREX</option><option>UALA</option><option>LEMON</option><option>BUEPP</option></select><input id="ini-b3-m" type="text" placeholder="$ monto"></div>
      </div>
    </div>
    <div class="field">
      <label>📸 CAPTURAS DE INICIO</label>
      <div class="foto-hint">Adjuntá capturas de Fichas y Billeteras al inicio</div>
      <div class="foto-upload-area" onclick="document.getElementById('fotos-ini').click()">📎 Tocar para adjuntar fotos</div>
      <input id="fotos-ini" type="file" accept="image/*" multiple style="display:none" onchange="mostrarPreviews(this,'previews-ini','count-ini')">
      <div id="previews-ini" class="foto-previews"></div>
      <div id="count-ini" class="foto-count"></div>
    </div>
  </div>

  <!-- FIN -->
  <div class="card">
    <div class="section-title">🔴 Fin de Turno</div>
    <div class="field-row">
      <div class="field"><label>DÍA</label><input id="f-fin-dia" type="text" placeholder="DD/MM/AAAA"></div>
      <div class="field monto"><label>HORA</label><input id="f-fin-hora" type="text" readonly></div>
    </div>
    <div class="field"><label>FICHAS</label><input id="f-fin-fichas" type="text" placeholder="ej: 1.389.554"></div>
    <div class="field">
      <label>BILLETERAS</label>
      <div class="bill-block">
        <div class="bill-row"><span class="bill-idx">1</span><select id="fin-b1-n"><option value="">— Elegir —</option><option>PERSONAL PAY</option><option>CLARO PAY</option><option>MERCADO PAGO</option><option>ASTROPAY</option><option>NX</option><option>PREX</option><option>UALA</option><option>LEMON</option><option>BUEPP</option></select><input id="fin-b1-m" type="text" placeholder="$ monto"></div>
        <div class="bill-row"><span class="bill-idx">2</span><select id="fin-b2-n"><option value="">— Elegir —</option><option>PERSONAL PAY</option><option>CLARO PAY</option><option>MERCADO PAGO</option><option>ASTROPAY</option><option>NX</option><option>PREX</option><option>UALA</option><option>LEMON</option><option>BUEPP</option></select><input id="fin-b2-m" type="text" placeholder="$ monto"></div>
        <div class="bill-row"><span class="bill-idx">3</span><select id="fin-b3-n"><option value="">— Elegir —</option><option>PERSONAL PAY</option><option>CLARO PAY</option><option>MERCADO PAGO</option><option>ASTROPAY</option><option>NX</option><option>PREX</option><option>UALA</option><option>LEMON</option><option>BUEPP</option></select><input id="fin-b3-m" type="text" placeholder="$ monto"></div>
      </div>
    </div>
    <div class="field">
      <label>📸 CAPTURAS DE FIN</label>
      <div class="foto-hint">Adjuntá capturas de Fichas y Billeteras al fin</div>
      <div class="foto-upload-area" onclick="document.getElementById('fotos-fin').click()">📎 Tocar para adjuntar fotos</div>
      <input id="fotos-fin" type="file" accept="image/*" multiple style="display:none" onchange="mostrarPreviews(this,'previews-fin','count-fin')">
      <div id="previews-fin" class="foto-previews"></div>
      <div id="count-fin" class="foto-count"></div>
    </div>
  </div>

  <!-- MOVIMIENTOS -->
  <div class="card">
    <div class="section-title">📊 Movimientos</div>
    <div class="field"><label>BONOS</label><input id="f-bonos" type="text" placeholder="0"></div>
    <div class="field"><label>DESCARTES</label><input id="f-descartes" type="text" placeholder="0"></div>
    <div class="field"><label>CARGAS DE OTROS TURNOS</label><input id="f-cargas" type="text" placeholder="—"></div>
    <div class="divider"></div>
    <div class="field">
      <label>PAGO PENDIENTE GRUPO</label>
      <div class="pending-block">
        <div class="pending-row"><span class="pending-idx">1</span><input id="pp-u1" class="grow" type="text" placeholder="Usuario"><input id="pp-m1" class="monto" type="text" placeholder="$ monto"></div>
        <div class="pending-row"><span class="pending-idx">2</span><input id="pp-u2" class="grow" type="text" placeholder="Usuario"><input id="pp-m2" class="monto" type="text" placeholder="$ monto"></div>
        <div class="pending-row"><span class="pending-idx">3</span><input id="pp-u3" class="grow" type="text" placeholder="Usuario"><input id="pp-m3" class="monto" type="text" placeholder="$ monto"></div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="field"><label>COLABORACIÓN RECIBIDA</label><input id="f-col-rec" type="text" placeholder="—"></div>
    <div class="field"><label>COLABORACIÓN PAGADA</label><input id="f-col-pag" type="text" placeholder="—"></div>
    <div class="field"><label>CARGA DE FICHAS</label><input id="f-carga-fichas" type="text" placeholder="—"></div>
    <div class="field"><label>RETIRO DE FICHAS</label><input id="f-retiro" type="text" placeholder="—"></div>
    <div class="field"><label>SUELDO</label><input id="f-sueldo" type="text" placeholder="—"></div>
    <div class="field"><label>PROPINA</label><input id="f-propina" type="text" placeholder="—"></div>
    <div class="extra-field">
      <input id="f-extra1-nombre" class="extra-nombre" type="text" placeholder="✏️ Escribí el nombre del item...">
      <input id="f-extra1-valor" class="extra-valor" type="text" placeholder="Valor...">
    </div>
    <div class="extra-field">
      <input id="f-extra2-nombre" class="extra-nombre" type="text" placeholder="✏️ Escribí el nombre del item...">
      <input id="f-extra2-valor" class="extra-valor" type="text" placeholder="Valor...">
    </div>
    <div class="divider"></div>
    <div class="field">
      <label>PAGOS PENDIENTES SIN RETIRAR</label>
      <div class="pending-block">
        <div class="pending-row"><span class="pending-idx">1</span><input id="psr-u1" class="grow" type="text" placeholder="Usuario"><input id="psr-m1" class="monto" type="text" placeholder="$ monto"></div>
        <div class="pending-row"><span class="pending-idx">2</span><input id="psr-u2" class="grow" type="text" placeholder="Usuario"><input id="psr-m2" class="monto" type="text" placeholder="$ monto"></div>
        <div class="pending-row"><span class="pending-idx">3</span><input id="psr-u3" class="grow" type="text" placeholder="Usuario"><input id="psr-m3" class="monto" type="text" placeholder="$ monto"></div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="field"><label>COMENTARIOS</label><textarea id="f-comentarios" placeholder="Escribí tus comentarios acá..." rows="4"></textarea></div>
  </div>

  <div class="progress-bar-wrap" id="progress-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>

  <button class="btn-copy" id="btn-copy" onclick="generarReporte()">GENERAR Y COPIAR REPORTE</button>

</div>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDkbTWJ-bIjCxIDhBS2A_d4seOAL0slguc",
  authDomain: "control-agentes.firebaseapp.com",
  projectId: "control-agentes",
  storageBucket: "control-agentes.firebasestorage.app",
  messagingSenderId: "1081360789264",
  appId: "1:1081360789264:web:f9782407d4f2440f7bbf95"
};
firebase.initializeApp(firebaseConfig);
const storage = firebase.storage();

const HORAS = {
  MAÑANA: { ini:'06:00', fin:'14:00' },
  TARDE:  { ini:'14:00', fin:'22:00' },
  NOCHE:  { ini:'22:00', fin:'06:00' }
};
let turno = 'MAÑANA';

function setTurno(t) {
  turno = t;
  document.querySelectorAll('.turno-btn').forEach(b => b.classList.toggle('active', b.textContent === t));
  document.getElementById('f-ini-hora').value = HORAS[t].ini;
  document.getElementById('f-fin-hora').value = HORAS[t].fin;
  const btn = document.getElementById('btn-copy');
  btn.textContent = 'GENERAR Y COPIAR REPORTE';
  btn.classList.remove('copied','uploading');
}

function mostrarPreviews(input, containerId, countId) {
  const container = document.getElementById(containerId);
  const countEl = document.getElementById(countId);
  container.innerHTML = '';
  Array.from(input.files).forEach((file, i) => {
    const reader = new FileReader();
    reader.onload = e => {
      const item = document.createElement('div');
      item.className = 'foto-preview-item';
      item.innerHTML = `<img src="${e.target.result}"><button class="foto-remove" onclick="removerFoto('${input.id}',${i},'${containerId}','${countId}')">✕</button>`;
      container.appendChild(item);
    };
    reader.readAsDataURL(file);
  });
  const total = input.files.length;
  countEl.textContent = total > 0 ? `✅ ${total} foto${total>1?'s':''} adjunta${total>1?'s':''}` : '';
}

function removerFoto(inputId, idx, containerId, countId) {
  const input = document.getElementById(inputId);
  const dt = new DataTransfer();
  Array.from(input.files).forEach((f,i) => { if(i!==idx) dt.items.add(f); });
  input.files = dt.files;
  mostrarPreviews(input, containerId, countId);
}

function v(id) {
  const el = document.getElementById(id);
  return el ? (el.value.trim() || '—') : '—';
}

function buildBilleteras(prefix) {
  const lines = [];
  for (let i=1;i<=3;i++) {
    const n = document.getElementById(`${prefix}-b${i}-n`).value;
    const m = document.getElementById(`${prefix}-b${i}-m`).value.trim();
    if (n) lines.push(`   💳 ${n}: $${m||'0'}`);
  }
  return lines.length ? '\n'+lines.join('\n') : ' —';
}

function buildPendientes(prefix) {
  const lines = [];
  for (let i=1;i<=3;i++) {
    const u = document.getElementById(`${prefix}-u${i}`).value.trim();
    const m = document.getElementById(`${prefix}-m${i}`).value.trim();
    if (u) lines.push(`   • ${u}: $${m||'—'}`);
  }
  return lines.length ? '\n'+lines.join('\n') : ' —';
}

function setProgress(pct) {
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('progress-bar').style.width = pct + '%';
}

async function subirFotos(inputId, carpeta, nombre) {
  const input = document.getElementById(inputId);
  const files = Array.from(input.files);
  if (!files.length) return [];
  const urls = [];
  for (let i=0; i<files.length; i++) {
    const file = files[i];
    const ext = file.name.split('.').pop();
    const path = `reportes/${carpeta}/${nombre}_${i+1}.${ext}`;
    const ref = storage.ref(path);
    await ref.put(file);
    const url = await ref.getDownloadURL();
    urls.push(url);
  }
  return urls;
}

async function generarReporte() {
  const btn = document.getElementById('btn-copy');
  btn.disabled = true;
  btn.classList.add('uploading');

  const nombre = v('f-nombre').replace(/\s+/g,'_').toUpperCase();
  const fecha  = v('f-ini-dia').replace(/\//g,'-');
  const carpeta = `${nombre}__${fecha}__${turno}`;

  try {
    const totalFotos = (document.getElementById('fotos-ini').files.length) + (document.getElementById('fotos-fin').files.length);
    let subidas = 0;

    if (totalFotos > 0) {
      btn.textContent = `⬆️ Subiendo fotos (0/${totalFotos})...`;
      setProgress(5);
    }

    const urlsIni = await subirFotos('fotos-ini', carpeta, 'inicio');
    subidas += urlsIni.length;
    if (totalFotos > 0) { btn.textContent = `⬆️ Subiendo fotos (${subidas}/${totalFotos})...`; setProgress(Math.round(subidas/totalFotos*90)); }

    const urlsFin = await subirFotos('fotos-fin', carpeta, 'fin');
    subidas += urlsFin.length;
    if (totalFotos > 0) { setProgress(100); }

    const lineasFotosIni = urlsIni.length ? '\n' + urlsIni.map((u,i)=>`   🟢 Foto inicio ${i+1}: ${u}`).join('\n') : '';
    const lineasFotosFin = urlsFin.length ? '\n' + urlsFin.map((u,i)=>`   🔴 Foto fin ${i+1}: ${u}`).join('\n') : '';
    const seccionFotos = (urlsIni.length || urlsFin.length)
      ? `\n\n📸 CAPTURAS${lineasFotosIni}${lineasFotosFin}`
      : '';

    const extra1n = document.getElementById('f-extra1-nombre').value.trim();
    const extra1v = document.getElementById('f-extra1-valor').value.trim() || '—';
    const extra2n = document.getElementById('f-extra2-nombre').value.trim();
    const extra2v = document.getElementById('f-extra2-valor').value.trim() || '—';
    const lineaExtra1 = extra1n ? `\n📌 ${extra1n}: ${extra1v}` : '';
    const lineaExtra2 = extra2n ? `\n📌 ${extra2n}: ${extra2v}` : '';

    const sep  = '━━━━━━━━━━━━━━━━━━━━━━';
    const sep2 = '──────────────────────';

    const texto =
`${sep}
📋 REPORTE DIARIO
🔹 Turno: ${turno}
👤 Agente: ${v('f-nombre')}
${sep}

🟢 INICIO DE TURNO
📅 Día: ${v('f-ini-dia')}
🕐 Hora: ${HORAS[turno].ini}
🎰 Fichas: ${v('f-ini-fichas')}
💳 Billetera:${buildBilleteras('ini')}

${sep2}

🔴 FIN DE TURNO
📅 Día: ${v('f-fin-dia')}
🕐 Hora: ${HORAS[turno].fin}
🎰 Fichas: ${v('f-fin-fichas')}
💳 Billetera:${buildBilleteras('fin')}

${sep}

📊 MOVIMIENTOS
${sep2}
🎁 Bonos: ${v('f-bonos')}
🗑 Descartes: ${v('f-descartes')}
🔄 Cargas Otros Turnos: ${v('f-cargas')}

💸 Pago Pendiente Grupo:${buildPendientes('pp')}

📥 Colaboración Recibida: ${v('f-col-rec')}
📤 Colaboración Pagada: ${v('f-col-pag')}
📲 Carga de Fichas: ${v('f-carga-fichas')}
